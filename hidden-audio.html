<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'self' 'unsafe-eval' 'unsafe-inline' https: http: data: blob: media:; script-src 'self' 'unsafe-eval' 'unsafe-inline' https: http: 'unsafe-hashes' blob: data:; media-src 'self' blob: data:; worker-src * blob: data: https: http: 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https: http:;"
		/>
	</head>
	<body>
		<script type="module">
			const audio_ctx = new window.AudioContext();

			const main_bus = audio_ctx.createGain();
			main_bus.connect(audio_ctx.destination);

			const music_bus = audio_ctx.createGain();
			const music_filter = audio_ctx.createBiquadFilter();
			music_filter.type = 'lowpass';
			music_filter.frequency.value = 20000;
			music_bus.connect(music_filter);
			music_filter.connect(main_bus);

			const sfx_bus = audio_ctx.createGain();
			sfx_bus.connect(main_bus);

			// Music Player logic
			const music_tracks = [];
			let current_music_source = null;

			async function playNextTrack() {
				if (music_tracks.length === 0) return;
				const track_path = music_tracks[Math.floor(Math.random() * music_tracks.length)];

				try {
					const response = await fetch(track_path);
					const array_buffer = await response.arrayBuffer();
					const audio_buffer = await audio_ctx.decodeAudioData(array_buffer);

					if (current_music_source) {
						current_music_source.stop();
						current_music_source.disconnect();
					}

					current_music_source = audio_ctx.createBufferSource();
					current_music_source.buffer = audio_buffer;
					current_music_source.connect(music_bus);
					current_music_source.onended = () => {
						playNextTrack();
					};
					current_music_source.start();
				} catch (e) {
					console.error('Error playing track:', track_path, e);
					setTimeout(playNextTrack, 1000);
				}
			}

			window.audioController.onSetMusicTracks(tracks => {
				const was_empty = music_tracks.length === 0;
				music_tracks.length = 0;
				music_tracks.push(...tracks);
				if (was_empty && music_tracks.length > 0) {
					playNextTrack();
				}
			});

			window.audioController.onSetMuffle(muffle_level => {
				const normalized = Math.max(0, Math.min(100, muffle_level)) / 100;

				const min_freq = 300;
				const max_freq = 20000;
				music_filter.frequency.value = min_freq + (max_freq - min_freq) * Math.pow(1 - normalized, 2);

				const min_gain = 0.2;
				const max_gain = 1.0;
				music_bus.gain.value = min_gain + (max_gain - min_gain) * (1 - normalized);
			});

			window.audioController.onPlaySfx(async sfx_path => {
				try {
					const response = await fetch(sfx_path);
					const array_buffer = await response.arrayBuffer();
					const audio_buffer = await audio_ctx.decodeAudioData(array_buffer);

					const source = audio_ctx.createBufferSource();
					source.buffer = audio_buffer;
					source.connect(sfx_bus);
					source.start();
				} catch (e) {
					console.error('Error playing sfx:', sfx_path, e);
				}
			});

			window.audioController.notifyReady();
		</script>
	</body>
</html>
